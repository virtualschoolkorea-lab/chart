<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>헤이청주 - 클릭 통계 대시보드</title>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;700&display=swap" rel="stylesheet" />
    <style>
        :root {
            --primary-color: #00B050;
            --primary-hover: #008C40;
            --bg-color: #F8F9FA;
            --text-main: #212529;
            --text-muted: #6C757D;
            --border-color: #DEE2E6;
        }

        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, 'Helvetica Neue', 'Segoe UI', 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 40px 20px;
        }

        .dashboard-container {
            max-width: 1000px;
            margin: 0 auto;
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.03);
            overflow: hidden;
        }

        .header-section {
            padding: 30px 40px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #ffffff;
        }

        h1 {
            font-size: 1.5rem;
            margin: 0;
            color: var(--text-main);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .btn-refresh {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.95rem;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn-refresh:hover {
            background-color: var(--primary-hover);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(0, 176, 80, 0.2);
        }

        .btn-refresh:active {
            transform: translateY(0);
        }

        .table-container {
            width: 100%;
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.95rem;
        }

        th, td {
            padding: 16px 20px;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
        }

        th {
            background-color: #F8F9FA;
            font-weight: 700;
            color: var(--text-muted);
            cursor: pointer;
            user-select: none;
            transition: background-color 0.2s;
            white-space: nowrap;
        }

        th:hover {
            background-color: #E9ECEF;
            color: var(--text-main);
        }

        tr:hover td {
            background-color: #F8F9FA;
        }

        .sort-icon {
            display: inline-block;
            margin-left: 4px;
            font-size: 0.8rem;
            color: #ADB5BD;
        }

        th.active .sort-icon {
            color: var(--primary-color);
        }

        .title-col {
            width: 40%;
            font-weight: 500;
        }

        .num-col {
            text-align: right;
            font-variant-numeric: tabular-nums;
        }

        .total-col {
            text-align: right;
            font-weight: 700;
            color: var(--primary-color);
            font-size: 1.05rem;
        }

        .loading-container {
            text-align: center;
            padding: 80px 20px;
            color: var(--text-muted);
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid var(--primary-color);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }
    </style>
</head>
<body>

<div class="dashboard-container">
    <div class="header-section">
        <h1>📊 콘텐츠 클릭 통계</h1>
        <button class="btn-refresh" onclick="loadStats()">
            <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
                <path d="M21 2v6h-6"></path>
                <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path>
            </svg>
            새로고침
        </button>
    </div>

    <div id="loading" class="loading-container">
        <div class="spinner"></div>
        <div style="font-weight: 500; margin-bottom: 8px;">데이터를 불러오고 있습니다 ⏳</div>
        <div style="font-size: 0.85rem; color: #ADB5BD;">클릭 수를 순차적으로 조회 중입니다</div>
    </div>

    <div class="table-container" id="table-wrapper" style="display: none;">
        <table id="stats-table">
            <thead>
                <tr>
                    <th class="title-col" onclick="sortTable('title')">행사명 <span class="sort-icon" id="icon-title">↕</span></th>
                    <th class="num-col" onclick="sortTable('detail')">상세정보 <span class="sort-icon" id="icon-detail">↕</span></th>
                    <th class="num-col" onclick="sortTable('apply')">신청하기 <span class="sort-icon" id="icon-apply">↕</span></th>
                    <th class="total-col" onclick="sortTable('total')">총 클릭수 <span class="sort-icon" id="icon-total">▼</span></th>
                </tr>
            </thead>
            <tbody id="stats-body"></tbody>
        </table>
    </div>
</div>

<script>
    // 메인 웹사이트와 완전히 동일하게 맞춤
    const namespace = 'heycheongju_clicks_v1';
    let statsData = [];
    let currentSort = { key: 'total', asc: false };

    function normalizeTitle(str) {
        return (str || '').trim();
    }

    // 메인 웹사이트의 getHash()와 동일
    function getHashId(str) {
        const clean = normalizeTitle(str);
        if (!clean) return 'none';

        let hash = 0;
        for (let i = 0; i < clean.length; i++) {
            hash = ((hash << 5) - hash) + clean.charCodeAt(i);
            hash = hash & hash;
        }
        return Math.abs(hash).toString(16);
    }

    function parseCSVToJSON(csv) {
        const rows = [];
        let row = [];
        let curr = '';
        let insideQuotes = false;

        for (let i = 0; i < csv.length; i++) {
            const char = csv[i];
            const nextChar = csv[i + 1];

            if (char === '"' && insideQuotes && nextChar === '"') {
                curr += '"';
                i++;
            } else if (char === '"') {
                insideQuotes = !insideQuotes;
            } else if (char === ',' && !insideQuotes) {
                row.push(curr);
                curr = '';
            } else if ((char === '\n' || (char === '\r' && nextChar === '\n')) && !insideQuotes) {
                row.push(curr);
                rows.push(row);
                row = [];
                curr = '';
                if (char === '\r') i++;
            } else {
                curr += char;
            }
        }

        if (curr !== '' || row.length > 0) {
            row.push(curr);
            rows.push(row);
        }

        if (rows.length < 2) return [];

        const headers = rows[0].map(h => h.trim().replace(/[\r\n]+/g, ''));
        const data = [];

        for (let i = 1; i < rows.length; i++) {
            if (rows[i].length === 1 && rows[i][0].trim() === '') continue;

            const obj = {};
            for (let j = 0; j < headers.length; j++) {
                if (headers[j]) {
                    obj[headers[j]] = rows[i][j]
                        ? rows[i][j].trim().replace(/[\r\n]+$/, '')
                        : '';
                }
            }

            if (obj.title || obj['행사명'] || obj['제목']) {
                data.push(obj);
            }
        }

        return data;
    }

    async function fetchClickCount(title, type) {
        const cleanTitle = normalizeTitle(title);
        const key = `${getHashId(cleanTitle)}_${type}`;

        try {
            const res = await fetch(`https://api.counterapi.dev/v1/${namespace}/${key}`);
            if (!res.ok) return 0;

            const data = await res.json();
            return data.count || 0;
        } catch (e) {
            console.error(`클릭 수 조회 실패: ${cleanTitle} / ${type}`, e);
            return 0;
        }
    }

    async function loadStats() {
        document.getElementById('loading').style.display = 'block';
        document.getElementById('table-wrapper').style.display = 'none';

        const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQV-02F-qXwS6yLb_XScKqwYj1N0qImwofY2Pyj2tvwnW0i1tl995_BjOfaVHpayppk6YYhqpdLrpa9/pub?output=csv&_t=" + Date.now();

        try {
            const response = await fetch(csvUrl);
            if (!response.ok) throw new Error('CSV 불러오기 실패');

            const csvText = await response.text();
            const events = parseCSVToJSON(csvText);

            statsData = [];

            const chunkSize = 3;
            for (let i = 0; i < events.length; i += chunkSize) {
                const chunk = events.slice(i, i + chunkSize);

                const fetchPromises = chunk.map(async (item) => {
                    const eventTitle = normalizeTitle(item.title || item['행사명'] || item['제목']);
                    if (!eventTitle) return;

                    const [detailClicks, applyClicks] = await Promise.all([
                        fetchClickCount(eventTitle, 'detail'),
                        fetchClickCount(eventTitle, 'apply')
                    ]);

                    statsData.push({
                        title: eventTitle,
                        detail: detailClicks,
                        apply: applyClicks,
                        total: detailClicks + applyClicks
                    });
                });

                await Promise.all(fetchPromises);
                await new Promise(resolve => setTimeout(resolve, 300));
            }

            applySorting();
        } catch (error) {
            console.error(error);
            document.getElementById('stats-body').innerHTML = `
                <tr>
                    <td colspan="4" class="empty-state">
                        데이터를 불러오는데 실패했습니다.<br>
                        잠시 후 새로고침 해주세요.
                    </td>
                </tr>
            `;
        } finally {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('table-wrapper').style.display = 'block';
        }
    }

    function applySorting() {
        statsData.sort((a, b) => {
            let diff = 0;

            if (currentSort.key === 'title') {
                diff = a.title.localeCompare(b.title, 'ko');
            } else {
                diff = b[currentSort.key] - a[currentSort.key];
            }

            if (currentSort.asc) diff *= -1;
            if (diff === 0) return a.title.localeCompare(b.title, 'ko');
            return diff;
        });

        updateSortIcons();
        renderTable();
    }

    function sortTable(key) {
        if (currentSort.key === key) {
            currentSort.asc = !currentSort.asc;
        } else {
            currentSort.key = key;
            currentSort.asc = (key === 'title');
        }
        applySorting();
    }

    function updateSortIcons() {
        const keys = ['title', 'detail', 'apply', 'total'];

        keys.forEach(k => {
            const th = document.querySelector(`th[onclick="sortTable('${k}')"]`);
            const icon = document.getElementById(`icon-${k}`);

            if (currentSort.key === k) {
                th.classList.add('active');
                icon.textContent = currentSort.asc ? '▲' : '▼';
            } else {
                th.classList.remove('active');
                icon.textContent = '↕';
            }
        });
    }

    function renderTable() {
        const tbody = document.getElementById('stats-body');
        tbody.innerHTML = '';

        if (statsData.length === 0) {
            tbody.innerHTML = `
                <tr>
                    <td colspan="4" class="empty-state">표시할 통계 데이터가 없습니다.</td>
                </tr>
            `;
            return;
        }

        statsData.forEach(item => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td class="title-col">${item.title}</td>
                <td class="num-col">${item.detail.toLocaleString()}</td>
                <td class="num-col">${item.apply.toLocaleString()}</td>
                <td class="total-col">${item.total.toLocaleString()}</td>
            `;
            tbody.appendChild(tr);
        });
    }

    document.addEventListener('DOMContentLoaded', loadStats);
</script>

</body>
</html>
