<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>헤이청주 - 클릭 통계 관리자 대시보드</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #4CAF50;
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --text-main: #333333;
            --border-color: #e0e0e0;
        }
        body { 
            font-family: 'Noto Sans KR', sans-serif; 
            background-color: var(--bg-color); 
            color: var(--text-main); 
            margin: 0; 
            padding: 20px; 
        }
        .dashboard-container { 
            max-width: 900px; 
            margin: 0 auto; 
            background-color: var(--card-bg); 
            padding: 30px; 
            border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); 
        }
        h1 { 
            text-align: center; 
            color: var(--primary-color); 
            margin-top: 0; 
        }
        .description { 
            text-align: center; 
            color: #666; 
            font-size: 0.95rem; 
            margin-bottom: 30px; 
        }
        .status-box {
            background-color: #e8f5e9;
            color: #2e7d32;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            font-weight: 500;
            margin-bottom: 20px;
        }
        table { 
            width: 100%; 
            border-collapse: collapse; 
            margin-top: 10px; 
        }
        th, td { 
            padding: 12px 15px; 
            border-bottom: 1px solid var(--border-color); 
            text-align: left; 
            font-size: 0.95rem;
        }
        th { 
            background-color: #fafafa; 
            color: #555; 
            font-weight: 700;
            border-top: 2px solid var(--primary-color);
            border-bottom: 2px solid var(--border-color);
        }
        tr:hover { background-color: #f9f9f9; }
        
        .text-right { text-align: right; }
        .text-center { text-align: center; }
        
        .badge { 
            display: inline-block;
            padding: 4px 10px; 
            border-radius: 20px; 
            font-size: 0.8rem; 
            font-weight: bold;
            color: white; 
            min-width: 30px;
            text-align: center;
        }
        .badge-detail { background-color: #3498db; }
        .badge-apply { background-color: #f39c12; }
        .badge-total { background-color: var(--primary-color); font-size: 0.9rem;}

        .rank {
            font-weight: bold;
            color: #888;
        }
        .rank-top {
            color: #e74c3c;
            font-size: 1.1rem;
        }
    </style>
</head>
<body>

<div class="dashboard-container">
    <h1>📊 이벤트 클릭 통계 대시보드</h1>
    <p class="description">사용자들이 누른 '상세보기' 및 '신청하기' 버튼의 누적 클릭수를 확인합니다.<br>(클릭 수가 1 이상인 행사만 표시됩니다)</p>

    <div id="status-message" class="status-box">
        데이터를 불러오는 중입니다. 잠시만 기다려주세요... ⏳<br>
        <small>(행사 목록과 통계 데이터를 매칭하는 데 몇 초 정도 소요될 수 있습니다)</small>
    </div>

    <table id="stats-table" style="display: none;">
        <thead>
            <tr>
                <th class="text-center" width="60">순위</th>
                <th>행사명</th>
                <th class="text-right" width="120">🔍 상세보기</th>
                <th class="text-right" width="120">🔗 신청하기</th>
                <th class="text-right" width="120">합계 (인기도)</th>
            </tr>
        </thead>
        <tbody id="table-body">
            </tbody>
    </table>
</div>

<script>
    const namespace = 'heycheongju_clicks_v1';
    // 메인 페이지와 동일한 구글 시트 주소
    const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQV-02F-qXwS6yLb_XScKqwYj1N0qImwofY2Pyj2tvwnW0i1tl995_BjOfaVHpayppk6YYhqpdLrpa9/pub?output=csv";

    // 원본 코드와 동일한 해시 생성 함수 (매우 중요: 이게 같아야 동일한 데이터를 불러옵니다)
    function getHash(str) {
        if (!str) return 'none'; 
        let hash = 0;
        for (let i = 0; i < str.length; i++) { 
            hash = ((hash << 5) - hash) + str.charCodeAt(i); 
            hash = hash & hash; 
        }
        return Math.abs(hash).toString(16); 
    }

    // 메인 페이지와 동일한 CSV 파싱 함수
    function parseCSVToJSON(csv) {
        const rows = []; let row = []; let curr = ''; let insideQuotes = false;
        for (let i = 0; i < csv.length; i++) {
            const char = csv[i]; const nextChar = csv[i + 1];
            if (char === '"' && insideQuotes && nextChar === '"') { curr += '"'; i++; } 
            else if (char === '"') { insideQuotes = !insideQuotes; } 
            else if (char === ',' && !insideQuotes) { row.push(curr); curr = ''; } 
            else if ((char === '\n' || (char === '\r' && nextChar === '\n')) && !insideQuotes) { row.push(curr); rows.push(row); row = []; curr = ''; if (char === '\r') i++; } 
            else { curr += char; }
        }
        if (curr !== '' || row.length > 0) { row.push(curr); rows.push(row); }
        if (rows.length < 2) return [];
        const headers = rows[0].map(h => h.trim().replace(/[\r\n]+/g, '')); const data = [];
        for (let i = 1; i < rows.length; i++) {
            if (rows[i].length === 1 && rows[i][0].trim() === '') continue; 
            const obj = {};
            for (let j = 0; j < headers.length; j++) { if (headers[j]) obj[headers[j]] = rows[i][j] ? rows[i][j].trim().replace(/[\r\n]+$/, '') : ''; }
            if (obj.type || obj.title) data.push(obj);
        }
        return data;
    }

    // 메인 실행 함수
    async function initDashboard() {
        try {
            // 1. 구글 시트 데이터 가져오기
            const response = await fetch(csvUrl + "&_t=" + new Date().getTime());
            if (!response.ok) throw new Error("CSV 다운로드 실패");
            const csvText = await response.text();
            let eventData = parseCSVToJSON(csvText);

            // 제목 기준으로 중복 제거 (같은 제목의 행사가 여러 번 측정되는 것 방지)
            const uniqueEvents = new Map();
            eventData.forEach(item => {
                if (item.title && item.title.trim() !== '') {
                    // 메인 페이지의 trackEventClick에서 사용한 따옴표 치환 로직 반영
                    const trackTitle = item.title.replace(/'/g, "\\'").replace(/"/g, '&quot;');
                    uniqueEvents.set(trackTitle, { title: item.title, trackTitle: trackTitle });
                }
            });

            const eventsToFetch = Array.from(uniqueEvents.values());
            const resultsData = [];
            const statusBox = document.getElementById('status-message');

            // 2. 각 행사별로 클릭 통계 가져오기 (무료 API 부하 방지를 위해 순차적 호출)
            for (let i = 0; i < eventsToFetch.length; i++) {
                const item = eventsToFetch[i];
                const hash = getHash(item.trackTitle);
                
                statusBox.innerHTML = `데이터 동기화 중... (${i + 1} / ${eventsToFetch.length}) ⏳`;

                let detailCount = 0;
                let applyCount = 0;

                try {
                    const resDetail = await fetch(`https://api.counterapi.dev/v1/${namespace}/${hash}_detail`);
                    if (resDetail.ok) detailCount = (await resDetail.json()).count;
                } catch (e) {} // 아직 클릭된 적이 없으면 404 에러가 나므로 무시

                try {
                    const resApply = await fetch(`https://api.counterapi.dev/v1/${namespace}/${hash}_apply`);
                    if (resApply.ok) applyCount = (await resApply.json()).count;
                } catch (e) {}

                const total = detailCount + applyCount;
                
                // 클릭이 1번이라도 발생한 것만 목록에 추가
                if (total > 0) {
                    resultsData.push({
                        title: item.title,
                        detailCount: detailCount,
                        applyCount: applyCount,
                        totalCount: total
                    });
                }
            }

            // 3. 총합 기준으로 내림차순(가장 인기있는 순) 정렬
            resultsData.sort((a, b) => b.totalCount - a.totalCount);

            // 4. 화면에 그리기
            renderTable(resultsData);

        } catch (error) {
            document.getElementById('status-message').innerHTML = '데이터를 불러오는 중 오류가 발생했습니다. 새로고침 해주세요. 😥';
            document.getElementById('status-message').style.color = 'red';
            console.error(error);
        }
    }

    function renderTable(data) {
        document.getElementById('status-message').style.display = 'none';
        document.getElementById('stats-table').style.display = 'table';
        const tbody = document.getElementById('table-body');

        if (data.length === 0) {
            tbody.innerHTML = '<tr><td colspan="5" class="text-center" style="padding: 30px;">아직 버튼이 클릭된 행사 데이터가 없습니다.</td></tr>';
            return;
        }

        data.forEach((item, index) => {
            const tr = document.createElement('tr');
            const rankClass = index < 3 ? 'rank rank-top' : 'rank'; // 1~3위는 색상 강조
            
            tr.innerHTML = `
                <td class="text-center ${rankClass}">${index + 1}</td>
                <td style="font-weight: 500;">${item.title}</td>
                <td class="text-right"><span class="badge badge-detail">${item.detailCount}</span></td>
                <td class="text-right"><span class="badge badge-apply">${item.applyCount}</span></td>
                <td class="text-right"><span class="badge badge-total">${item.totalCount}</span></td>
            `;
            tbody.appendChild(tr);
        });
    }

    // 페이지 로드 시 실행
    document.addEventListener('DOMContentLoaded', initDashboard);
</script>

</body>
</html>
