<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>헤이청주 - 클릭 통계 대시보드</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #f4f7f6;
            color: #333;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: #fff;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        h1 { font-size: 1.5rem; margin-top: 0; color: #4CAF50; }
        .controls { margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .btn-refresh {
            background-color: #4CAF50; color: white; border: none; padding: 8px 16px; 
            border-radius: 6px; cursor: pointer; font-weight: bold;
        }
        .btn-refresh:hover { background-color: #388E3C; }
        
        table {
            width: 100%; border-collapse: collapse; font-size: 0.9rem;
        }
        th, td {
            padding: 12px; text-align: left; border-bottom: 1px solid #eee;
        }
        th { background-color: #f9f9f9; font-weight: 700; cursor: pointer; }
        th:hover { background-color: #f1f1f1; }
        tr:hover { background-color: #fafafa; }
        .count-col { text-align: right; font-weight: bold; width: 120px; }
        .total-col { text-align: right; font-weight: bold; width: 120px; color: #4CAF50; }
        
        .loading { text-align: center; padding: 40px; color: #666; }
    </style>
</head>
<body>

<div class="container">
    <div class="controls">
        <h1>📊 헤이청주 콘텐츠 클릭 통계</h1>
        <button class="btn-refresh" onclick="loadStats()">새로고침</button>
    </div>

    <div id="loading" class="loading">데이터를 불러오고 계산하는 중입니다... ⏳<br>(콘텐츠 수에 따라 수 초가 걸릴 수 있습니다)</div>

    <table id="stats-table" style="display: none;">
        <thead>
            <tr>
                <th>행사명 (Title)</th>
                <th class="count-col" onclick="sortTable('detail')">상세정보 클릭 ↕</th>
                <th class="count-col" onclick="sortTable('apply')">신청하기 클릭 ↕</th>
                <th class="total-col" onclick="sortTable('total')">총 클릭수 ↕</th>
            </tr>
        </thead>
        <tbody id="stats-body">
            </tbody>
    </table>
</div>

<script>
    const namespace = 'heycheongju_clicks_v1';
    let statsData = []; // 정렬을 위해 데이터를 저장할 배열

    // 고유 해시 ID 생성 (메인페이지와 동일해야 함)
    function getHashId(str) {
        let hash = 0;
        for (let i = 0; i < str.length; i++) {
            let char = str.charCodeAt(i);
            hash = ((hash << 5) - hash) + char;
            hash = hash & hash;
        }
        return Math.abs(hash).toString(16);
    }

    // CSV 파싱 (기존 코드 재사용)
    function parseCSVToJSON(csv) {
        const rows = [];
        let row = [], curr = '', insideQuotes = false;
        for (let i = 0; i < csv.length; i++) {
            const char = csv[i], nextChar = csv[i + 1];
            if (char === '"' && insideQuotes && nextChar === '"') { curr += '"'; i++; }
            else if (char === '"') { insideQuotes = !insideQuotes; }
            else if (char === ',' && !insideQuotes) { row.push(curr); curr = ''; }
            else if ((char === '\n' || (char === '\r' && nextChar === '\n')) && !insideQuotes) {
                row.push(curr); rows.push(row); row = []; curr = '';
                if (char === '\r') i++;
            } else { curr += char; }
        }
        if (curr !== '' || row.length > 0) { row.push(curr); rows.push(row); }
        if (rows.length < 2) return [];
        
        const headers = rows[0].map(h => h.trim());
        const data = [];
        for (let i = 1; i < rows.length; i++) {
            if (rows[i].length === 1 && rows[i][0].trim() === '') continue;
            const obj = {};
            for (let j = 0; j < headers.length; j++) {
                if (headers[j]) obj[headers[j]] = rows[i][j] ? rows[i][j].trim() : '';
            }
            if (obj.type || obj.title) data.push(obj);
        }
        return data;
    }

    // 개별 클릭수 가져오기 API
    async function fetchClickCount(title, type) {
        const key = `${getHashId(title)}_${type}`;
        try {
            const res = await fetch(`https://api.counterapi.dev/v1/${namespace}/${key}`);
            if (!res.ok) return 0; // 아직 클릭이 없으면 404가 뜨며 0 반환
            const data = await res.json();
            return data.count || 0;
        } catch {
            return 0;
        }
    }

    async function loadStats() {
        document.getElementById('loading').style.display = 'block';
        document.getElementById('stats-table').style.display = 'none';
        
        const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQV-02F-qXwS6yLb_XScKqwYj1N0qImwofY2Pyj2tvwnW0i1tl995_BjOfaVHpayppk6YYhqpdLrpa9/pub?output=csv";
        
        try {
            // 1. 구글 시트 데이터 가져오기
            const response = await fetch(csvUrl);
            const csvText = await response.text();
            const events = parseCSVToJSON(csvText);
            
            statsData = [];

            // 2. 모든 이벤트의 클릭수 비동기로 가져오기 (Promise.all 병렬 처리)
            const fetchPromises = events.map(async (item) => {
                if (!item.title) return;
                
                // 동시에 2개(상세, 신청) 버튼 통계를 호출
                const [detailClicks, applyClicks] = await Promise.all([
                    fetchClickCount(item.title, 'detail'),
                    fetchClickCount(item.title, 'apply')
                ]);

                statsData.push({
                    title: item.title,
                    detail: detailClicks,
                    apply: applyClicks,
                    total: detailClicks + applyClicks
                });
            });

            await Promise.all(fetchPromises);

            // 기본 정렬: 총 클릭수 내림차순
            statsData.sort((a, b) => b.total - a.total);
            renderTable();

        } catch (error) {
            console.error(error);
            alert('데이터를 불러오는데 실패했습니다.');
        } finally {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('stats-table').style.display = 'table';
        }
    }

    // 테이블 그리기
    function renderTable() {
        const tbody = document.getElementById('stats-body');
        tbody.innerHTML = '';
        
        statsData.forEach(item => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${item.title}</td>
                <td class="count-col">${item.detail.toLocaleString()}</td>
                <td class="count-col">${item.apply.toLocaleString()}</td>
                <td class="total-col">${item.total.toLocaleString()}</td>
            `;
            tbody.appendChild(tr);
        });
    }

    // 테이블 컬럼 클릭 시 정렬 기능
    let currentSort = { key: 'total', asc: false };
    function sortTable(key) {
        if (currentSort.key === key) {
            currentSort.asc = !currentSort.asc;
        } else {
            currentSort.key = key;
            currentSort.asc = false; // 기본은 내림차순
        }

        statsData.sort((a, b) => {
            if (currentSort.asc) return a[key] - b[key];
            return b[key] - a[key];
        });
        
        renderTable();
    }

    // 페이지 로드 시 실행
    document.addEventListener('DOMContentLoaded', loadStats);
</script>

</body>
</html>
